  <text x="1032" y="478" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18" font-weight="600" fill="#111827">SOFTWARE_DEV_D001</text>
  <rect x="70" y="542" width="920" height="114" rx="14" fill="#ffffff" stroke="#d8dee9" stroke-width="3"/>
  <text x="92" y="571" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Official Source</text>
  <text x="92" y="600" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">ClaimBound evidence repository</text>
  <text x="92" y="626" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">https://github.com/ClaimBound/claimbound-evidence</text>
  <rect x="1010" y="542" width="920" height="114" rx="14" fill="#ffffff" stroke="#d8dee9" stroke-width="3"/>
  <text x="1032" y="571" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Target / Candidate</text>
  <text x="1032" y="600" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">validator regression gate</text>
  <text x="1032" y="626" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">Evidence-card JSON missing execution_mode.</text>
  <rect x="70" y="672" width="920" height="114" rx="14" fill="#ffffff" stroke="#d8dee9" stroke-width="3"/>
  <text x="92" y="701" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Controls / Gate</text>
  <text x="92" y="730" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">pytest missing-field regression + validate-all.</text>
  <rect x="1010" y="672" width="920" height="114" rx="14" fill="#ffffff" stroke="#d8dee9" stroke-width="3"/>
  <text x="1032" y="701" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Period / Scope / Date</text>
  <text x="1032" y="730" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">repository state at access date 2026-06-11</text>
  <text x="1032" y="756" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">Access date: 2026-06-11</text>
  <rect x="70" y="802" width="920" height="114" rx="14" fill="#ffffff" stroke="#d8dee9" stroke-width="3"/>
  <text x="92" y="831" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Artifact / Report</text>
  <text x="92" y="860" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">artifacts/software_dev_d001_summary.json</text>
  <text x="92" y="886" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#111827">artifacts/software_dev_d001_summary.json</text>
  <rect x="1010" y="802" width="920" height="114" rx="14" fill="#ffffff" stroke="#d8dee9" stroke-width="3"/>
  <text x="1032" y="831" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Evidence URL</text>
  <text x="1032" y="860" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18" font-weight="600" fill="#111827">docs/evidence_cards/CLAIMBOUND-SOFTWARE_DEV_D001-2026-06-11.json</text>
  <rect x="70" y="936" width="1860" height="186" rx="14" fill="#fbfcfe" stroke="#d8dee9" stroke-width="3"/>
  <text x="92" y="966" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Claim boundary</text>
  <text x="92" y="993" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500" fill="#1f2937">This card verifies only that, on the access date, the ClaimBound evidence-card validator rejects a card JSON missing the required field execution_mode when</text>
  <text x="92" y="1017" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500" fill="#1f2937">exercised by the frozen pytest gate named in protocol SOFTWARE_DEV_D001. It does not prove general software security, complete validator coverage, CI sufficiency,</text>
  <text x="92" y="1041" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500" fill="#1f2937">code-review replacement or deployment readiness.</text>
  <text x="92" y="1075" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" fill="#55627a">Limitations: 1. Single-operator manual check only. 2. One required-field regression gate only. 3. Does not audit the entire validator or all card fields. 4. Does not replace tests, CI, code</text>
  <text x="92" y="1095" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="500" fill="#55627a">review or security audit.</text>
</svg>
