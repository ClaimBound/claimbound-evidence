  <text x="92" y="449" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="750" fill="#1758d6">Evidence ID</text>
  <text x="92" y="478" font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="18" font-weight="600" fill="#111827">CLAIMBOUND-SOFTWARE_DEV_D001-2026-06-11</text>
