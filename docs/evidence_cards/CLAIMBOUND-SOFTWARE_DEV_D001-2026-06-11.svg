  <rect x="1410" y="193" width="520" height="52" rx="17" fill="url(#blueGrad)"/>
  <text x="1431" y="227" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="800" fill="#ffffff">evidence_result</text>
  <rect x="70" y="278" width="1860" height="96" rx="16" fill="#f8fbff" stroke="#1758d6" stroke-width="4"/>
  <text x="96" y="309" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="750" fill="#1758d6">Allowed narrow claim</text>
  <text x="96" y="351" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="39" font-weight="800" fill="#0d1736">Under frozen SOFTWARE_DEV_D001, the regression gate passed: validator rejects card</text>
