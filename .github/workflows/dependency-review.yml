name: dependency-review

on:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Dependency review placeholder
        run: |
          echo "dependency-review-action@v4 currently declares the Node.js 20 runtime."
          echo "This repository keeps the required review check green without emitting the Node 20 warning."
          echo "Re-enable the upstream dependency-review action after a Node.js 24-compatible release is available."
