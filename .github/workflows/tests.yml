name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pytest_args: "-n auto -q"
          - os: windows-latest
            pytest_args: "-q"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      - run: uv run claimbound doctor
      - run: uv run claimbound validate-all
      - run: uv run --extra dev pytest ${{ matrix.pytest_args }}